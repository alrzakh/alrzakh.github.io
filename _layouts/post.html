<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
</head>
<body>
    {% include header.html %}
    
    <article class="post">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">
            Posted on {{ page.date | date: "%B %d, %Y" }} by {{ page.author }}
        </p>
        <div class="post-content">
            {{ content }}
        </div>
    </article>

    {% include footer.html %}
</body>
</html>
